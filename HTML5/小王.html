<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小王</title>
  <style>
    ul,
    li {
      list-style: none;
    }

    .box {
      position: relative;
      width: 1000px;
      margin: 100px auto;
      overflow: hidden;
    }

    .box::before {
      position: absolute;
      top: 0;
      left: 0;
      content: "";
      width: 100%;
      height: 100px;
      background-color: #fff;
      border-radius: 50%;
      margin-top: -50px;
    }

    .box::after {
      position: absolute;
      bottom: 0;
      left: 0;
      content: "";
      width: 100%;
      height: 100px;
      background-color: #fff;
      border-radius: 50%;
      margin-bottom: -50px;
    }

    .box ul {
      display: flex;
      gap: 15px;
      padding: 0;
      margin: 0;
      overflow-x: scroll;
      /* 普通浏览器隐藏滚动条 */
      scrollbar-width: none;
      /* 平滑滚动 */
      scroll-behavior: smooth;
    }

    /* 让谷歌或苹果浏览器隐藏滚动条 */
    .box ul::-webkit-scrollbar {
      display: none;
    }

    .box ul li {
      width: 200px;

    }

    .box ul li img {
      width: 200px;
      height: 300px;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <div class="box">

  </div>
  <script>
    const scrollContainer = document.querySelector('.box ul');
    scrollContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      scrollContainer.scrollLeft += e.deltaY * 1.7;
    })
  </script>
